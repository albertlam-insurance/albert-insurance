<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Albert Lam | 專業保單檢視與理財預約</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, 'Microsoft JhengHei', sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 40px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        h1 {
            color: #00008f;
            text-align: center;
            margin-bottom: 10px;
            font-size: 24px;
        }
        p.subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 15px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
        }
        input[type="text"], select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
        }
        button {
            width: 100%;
            background-color: #00008f;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #000066;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>專屬保單檢視預約</h1>
    <p class="subtitle">透過系統化分析，為您建構完善的風險防護網與專屬退休規劃。</p>

    <form action="https://formspree.io/f/xykqkjpg" method="POST">
        <label for="name">客戶姓名：</label>
        <input type="text" id="name" name="姓名" required placeholder="請輸入您的姓名">

        <label for="contact">聯絡電話 / WeChat / WhatsApp：</label>
        <input type="text" id="contact" name="聯絡方式" required placeholder="請輸入方便聯繫的號碼或帳號">

        <label for="service">希望諮詢的項目：</label>
        <select id="service" name="諮詢項目">
            <option value="系統化保單全面檢視">系統化保單全面檢視</option>
            <option value="理財與退休收入規劃">理財與退休收入規劃</option>
            <option value="醫療與重疾保障諮詢">醫療與重疾保障諮詢</option>
            <option value="其他客製化需求">其他客製化需求</option>
        </select>

        <label for="message">方便聯絡的時間或補充備註（選填）：</label>
        <textarea id="message" name="補充備註" rows="4" placeholder="例如：平日晚上 8 點後方便聯絡，或想特別了解某項產品..."></textarea>

        <button type="submit">確認送出預約</button>
    </form>
    
    <div class="footer">
        &copy; 2026 Albert Lam. 保留所有權利。
    </div>
</div>

</body>
</html>
